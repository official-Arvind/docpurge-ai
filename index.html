<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocPurge AI — Loading</title>
  <meta http-equiv="refresh" content="1;url=./home/home.html" />
  <link rel="icon" type="image/png" href="./assets/img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00ff88;
      --blue: #00c3ff;
      --bg: #080b14;
    }
    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .splash {
      text-align: center;
      animation: fadeIn 0.6s ease forwards;
    }
    .logo-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      position: relative;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 24px var(--green));
      animation: pulse 1.5s ease-in-out infinite;
    }
    .brand {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
      letter-spacing: 0.12em;
    }
    .bar-wrap {
      margin-top: 32px;
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 4px;
      animation: load 1s ease forwards;
    }
    @keyframes load {
      from { width: 0%; }
      to   { width: 100%; }
    }
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 24px var(--green)); }
      50%       { filter: drop-shadow(0 0 48px var(--green)) drop-shadow(0 0 12px var(--blue)); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-wrap">
      <img src="./assets/img/logo.png" alt="DocPurge AI" />
    </div>
    <div class="brand">DocPurge AI</div>
    <div class="tagline">// INITIALIZING SUITE...</div>
    <div class="bar-wrap"><div class="bar"></div></div>
  </div>
  <script>
    setTimeout(() => { window.location.href = './home/home.html'; }, 1000);
  </script>
</body>
</html>
